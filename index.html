<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Gun Violence: An Interactive Public Health Policy Dashboard</title>
    <meta name="description" content="An interactive, evidence-based React dashboard on community gun violence in the United States — updated with 2023 finalized and 2024 provisional CDC data, disparities, socio-ecological determinants, interventions, and policy solutions, framed through an equity lens.">

    <!-- Styling / charts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- React (via CDN so this stays a single, double-clickable file) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Application Structure Plan: A React single-page dashboard with an animated + photographic hero, sticky side-navigation, and scroll-progress bar. Structure follows the five Objectives of Epidemiology. Real photography (Unsplash) and Font Awesome iconography replace emoji/SVG-only visuals; every socio-ecological (SEM) risk level is now individually cited, and Objective 2 opens with an equity-framed, well-cited context paragraph. -->
    <!-- Data currency: 2023 figures are CDC-finalized; 2024 figures are CDC provisional (per Pew Research, Apr 2026 and The Trace, 2025). Photographs are royalty-free (Unsplash license) with graceful gradient fallbacks. -->
    <style>
        :root{
            --bg-1:#F8F9FA; --bg-2:#E9ECEF; --text:#2D3748; --muted:#4A5568;
            --card:rgba(255,255,255,0.95); --card-border:rgba(255,255,255,0.4);
            --accent:#E53E3E; --accent-dark:#C53030; --ink:#1A202C; --grid:#E2E8F0;
        }
        html.dark{
            --bg-1:#0F141B; --bg-2:#1A202C; --text:#E2E8F0; --muted:#A0AEC0;
            --card:rgba(26,32,44,0.92); --card-border:rgba(255,255,255,0.08);
            --accent:#FC8181; --accent-dark:#F56565; --ink:#E2E8F0; --grid:#2D3748;
        }
        body{
            background:linear-gradient(135deg,var(--bg-1) 0%,var(--bg-2) 100%);
            color:var(--text); font-family:'Inter',sans-serif; line-height:1.7;
            transition:background .4s ease,color .4s ease;
        }
        h1,h2,h3,h4{ color:var(--text); }
        .muted{ color:var(--muted); }
        /* Loading splash */
        #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:linear-gradient(135deg,#1A202C,#742A2A);color:#fff;z-index:200;font-family:'Inter',sans-serif}
        #boot .spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        /* Scroll progress */
        #progress-bar{position:fixed;top:0;left:0;height:4px;width:0%;z-index:60;background:linear-gradient(90deg,#E53E3E,#F6AD55);box-shadow:0 0 10px rgba(229,62,62,.6);transition:width .1s linear}
        /* Animated + photographic Hero */
        .hero{position:relative;overflow:hidden;isolation:isolate;background:linear-gradient(120deg,#1A202C,#2D3748 40%,#742A2A 100%);background-size:200% 200%;animation:heroShift 16s ease infinite}
        @keyframes heroShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .hero-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2;opacity:.28;filter:saturate(1.1)}
        .hero-veil{position:absolute;inset:0;z-index:-1;background:radial-gradient(1200px 500px at 30% 20%,rgba(229,62,62,.25),transparent 60%),linear-gradient(180deg,rgba(15,20,27,.55),rgba(15,20,27,.8))}
        .hero canvas#sparkline{position:absolute;inset:0;width:100%;height:100%;z-index:-1;opacity:.5}
        .hero-blob{position:absolute;border-radius:50%;filter:blur(40px);opacity:.35;z-index:-1;mix-blend-mode:screen;animation:float 14s ease-in-out infinite}
        .blob-a{width:340px;height:340px;background:#E53E3E;top:-80px;left:-60px}
        .blob-b{width:300px;height:300px;background:#F6AD55;bottom:-100px;right:-40px;animation-delay:-5s}
        .blob-c{width:240px;height:240px;background:#4299E1;top:30%;right:25%;animation-delay:-9s}
        @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-25px) scale(1.08)}66%{transform:translate(-20px,20px) scale(.95)}}
        .hero-title, .hero-title span{color:#fff}
        .hero-title span{display:inline-block;opacity:0;transform:translateY(20px);animation:rise .7s forwards}
        @keyframes rise{to{opacity:1;transform:translateY(0)}}
        .pulse-dot{width:10px;height:10px;border-radius:50%;background:#68D391;box-shadow:0 0 0 rgba(104,211,145,.7);animation:pulse 2s infinite}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(104,211,145,.7)}70%{box-shadow:0 0 0 12px rgba(104,211,145,0)}100%{box-shadow:0 0 0 0 rgba(104,211,145,0)}}
        .scroll-cue{animation:bob 1.8s ease-in-out infinite}
        @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
        /* Reveal on scroll */
        .reveal{opacity:0;transform:translateY(28px);transition:opacity .6s ease,transform .6s ease}
        .reveal.visible{opacity:1;transform:none}
        .chart-container{position:relative;width:100%;max-width:600px;margin:auto;height:350px;max-height:400px}
        .nav-link{transition:all .3s cubic-bezier(.4,0,.2,1);border-radius:8px;margin:2px 0;color:var(--muted);cursor:pointer}
        .nav-link.active{color:#fff;background:linear-gradient(135deg,#E53E3E,#C53030);font-weight:600;box-shadow:0 4px 12px rgba(229,62,62,.3);transform:translateX(4px)}
        .nav-link:hover{color:var(--accent);background-color:rgba(229,62,62,.08);transform:translateX(2px)}
        .tab-button.active{background:linear-gradient(135deg,#2D3748,#1A202C);color:#fff;box-shadow:0 2px 8px rgba(45,55,72,.3)}
        .tab-button{background:linear-gradient(135deg,#E2E8F0,#CBD5E0);color:#2D3748;transition:all .3s ease;cursor:pointer}
        .tab-button:hover{background:linear-gradient(135deg,#CBD5E0,#A0AEC0);transform:translateY(-1px)}
        .accordion-content{overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
        .citation{font-size:.75em;vertical-align:super;color:var(--accent);text-decoration:none;margin-left:2px;font-weight:600;padding:1px 3px;border-radius:3px;background:rgba(229,62,62,.12);transition:all .2s ease}
        .citation:hover{background:rgba(229,62,62,.25);transform:scale(1.1)}
        .causal-diagram{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px}
        .causal-step{background:linear-gradient(135deg,#FFFFFF,#F7FAFC);border:2px solid #E2E8F0;padding:16px;border-radius:12px;font-size:.9rem;font-weight:600;width:100%;max-width:90%;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:transform .2s ease;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100px}
        html.dark .causal-step{background:linear-gradient(135deg,#1A202C,#2D3748);border-color:#2D3748;color:var(--text)}
        .causal-step:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.15);border-color:#E53E3E}
        .causal-arrow{font-size:2rem;color:var(--accent);margin:0;text-shadow:0 2px 4px rgba(229,62,62,.3)}
        .section-card{background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--card-border);box-shadow:0 8px 32px rgba(0,0,0,.1);transition:all .3s ease}
        .section-card:hover{box-shadow:0 10px 40px rgba(0,0,0,.15)}
        .kpi-card{background:linear-gradient(135deg,var(--card),var(--card));border:2px solid var(--grid);transition:all .3s ease}
        .kpi-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);border-color:var(--accent-dark)}
        .tinted{border:1px solid var(--grid)}
        html.dark .tinted{background:rgba(255,255,255,.04)!important;border-color:#2D3748}
        html.dark .tinted h4, html.dark .tinted p, html.dark .tinted li, html.dark .tinted div, html.dark .tinted a{color:var(--text)!important}
        .toggle-btn{transition:all .25s ease;border:1px solid var(--grid);cursor:pointer}
        .toggle-btn.active{background:linear-gradient(135deg,#E53E3E,#C53030);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(229,62,62,.3)}
        #backToTop{position:fixed;bottom:24px;right:24px;z-index:50;opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s ease;transform:translateY(10px);cursor:pointer}
        #backToTop.show{opacity:1;pointer-events:auto;transform:translateY(0)}
        .credit{font-size:.7rem;color:var(--muted)}
        .tier-badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:9999px;margin-left:8px;vertical-align:middle;letter-spacing:.02em}
        /* Photography */
        .photo-wrap{position:relative;overflow:hidden;border-radius:1rem}
        .photo{display:block;width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
        .photo-wrap:hover .photo{transform:scale(1.05)}
        .photo-cap{position:absolute;left:0;right:0;bottom:0;padding:14px 16px;font-size:.72rem;color:#fff;background:linear-gradient(0deg,rgba(0,0,0,.72),transparent)}
        .fallback-grad{background:linear-gradient(135deg,#742A2A,#1A202C);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:2rem}
        .level-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;color:#fff;flex-shrink:0}
        @media (min-width:768px){
            .causal-diagram{flex-direction:row;justify-content:space-around;align-items:stretch}
            .causal-arrow{transform:rotate(0deg)!important;margin:0 10px}
            .causal-step{max-width:22%;min-height:120px}
        }
        @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    </style>
</head>
<body>

    const REFERENCES = [

        'Bailey ZD, Krieger N, Agénor M, Graves J, Linos N, Bassett MT. Structural racism and health inequities in the USA: evidence and interventions. Lancet. 2017;389(10077):1453-1463.',
        'Zatzick D, Russo J, Lord SP, et al. Collaborative care intervention targeting violence-risk behaviors, substance use, and PTSD/depressive symptoms in injured adolescents: a randomized clinical trial. JAMA Pediatr. 2014;168(6):532-539.',
        'Heller SB. Summer jobs reduce violence among disadvantaged youth. Science. 2014;346(6214):1219-1223.',
        'Purtle J, Dicker R, Cooper C, et al. Hospital-based violence intervention programs save lives and money. J Trauma Acute Care Surg. 2013;75(2):331-333.',

        'Branas CC, Kondo MC, Murphy SM, et al. Urban blight remediation as a cost-beneficial solution to firearm violence. Am J Public Health. 2016;106(12):2158-2164.',
        'The Trace. Newest CDC data confirm gun deaths fell in 2024, but remain higher than before the pandemic. 2025. <a class="underline" href="https://www.thetrace.org/2025/07/gun-deaths-suicide-homicide-data-cdc/" target="_blank" rel="noopener">thetrace.org</a>.',
        'Everytown for Gun Safety Support Fund. The Economic Cost of Gun Violence (~$557 billion annually). November 2024. <a class="underline" href="https://everytownresearch.org/report/the-economic-cost-of-gun-violence/" target="_blank" rel="noopener">everytownresearch.org</a>.',
        'Centers for Disease Control and Prevention. WISQARS Nonfatal Injury Reports. 2023. <a class="underline" href="https://wisqars.cdc.gov" target="_blank" rel="noopener">wisqars.cdc.gov</a>.',

        'Cunningham RM, Carter PM, Ranney M, et al. Violent reinjury and mortality among youth seeking emergency department care for assault-related injury. JAMA Pediatr. 2015;169(1):63-70.',
        'Kravitz-Wirtz N, Bruns A, Aubel AJ, Zhang X, Buggs SA. Inequities in community exposure to deadly gun violence by race/ethnicity, poverty, and neighborhood disadvantage among youth in large US cities. J Urban Health. 2022;99(4):610-625.',
        'Siegel M, Ross CS, King C 3rd. The relationship between gun ownership and firearm homicide rates in the United States, 1981-2010. Am J Public Health. 2013;103(11):2098-2105.',
        'Crandall M, Sharp D, Unger E, et al. Trauma deserts: distance from a trauma center, transport times, and mortality from gunshot wounds in Chicago. Am J Public Health. 2013;103(6):1103-1109.',
        'South EC, Hohl BC, Kondo MC, MacDonald JM, Branas CC. Effect of greening vacant land on mental health of community-dwelling adults: a cluster randomized trial. JAMA Netw Open. 2018;1(3):e180298.',

    ];

    // Objective 1.3 — Socio-Ecological Model risk levels, now each individually cited
    const SEM_LEVELS = [
        { name:'Individual', icon:'fa-user', color:'#E53E3E',
          blurb:'Personal history and biology that shape an individual’s risk.',
          items:[
            {k:'Prior Violence Exposure', v:'A previous violent injury raises the risk of violent reinjury roughly 5–10× within two years.', c:[23,17]},
            {k:'Age / Sex', v:'Risk peaks at ages 15–34 and is overwhelmingly male; adolescents show the highest recurrence.', c:[3]},
            {k:'Substance Use', v:'Alcohol or other drugs are involved in a large share of assault-injury encounters, compounding reinjury risk.', c:[23,14]}
        ]},
        { name:'Relationship', icon:'fa-people-group', color:'#DD6B20',
          blurb:'Peers, family, and close social ties that transmit — or buffer — risk.',
          items:[
            {k:'Peer & Social Networks', v:'Gunshot victimization spreads through social networks; each network tie to a prior victim measurably raises risk.', c:[22]},
            {k:'Family Structure', v:'Exposure to family violence, instability, and low supervision predicts later serious violent behavior.', c:[29]},
            {k:'School Connection', v:'School disengagement, suspension, and the achievement gap forecast future violence involvement.', c:[28]}
        ]},
        { name:'Community', icon:'fa-city', color:'#38A169',
          blurb:'Neighborhood conditions and the built environment where violence concentrates.',
          items:[
            {k:'Neighborhood Disinvestment & Blight', v:'Vacant, blighted lots and disinvestment elevate risk; remediating them is a cost-beneficial way to cut firearm violence.', c:[10]},
            {k:'Housing Instability & Green Space', v:'Overcrowding and frequent moves raise stress and conflict, while greening vacant land improves mental health and safety.', c:[27,8]},
            {k:'Firearm Availability', v:'Higher household gun ownership at the community level is associated with significantly higher firearm-homicide rates.', c:[25]}
        ]},
        { name:'Societal / Structural', icon:'fa-landmark', color:'#805AD5',
          blurb:'Laws, policies, and structural racism that stratify opportunity and exposure.',
          items:[
            {k:'Structural Racism & Poverty', v:'Concentrated poverty and structural racism drive deeply unequal exposure to deadly gun violence across race and place.', c:[24,4]},
            {k:'Educational Inequity', v:'Under-resourced schools widen the achievement gap and constrain future opportunity, feeding the violence cycle.', c:[28]},
            {k:'Employment Discrimination', v:'Blocked access to quality jobs perpetuates poverty; conversely, employment programs reduce violent involvement.', c:[4,6]}
        ]},
        { name:'Health System', icon:'fa-briefcase-medical', color:'#3182CE',
          blurb:'Access to trauma care, coverage, and behavioral health that shape recovery.',
          items:[
            {k:'Trauma Deserts', v:'Greater distance from a trauma center (“trauma deserts”) is associated with higher mortality from gunshot wounds.', c:[26]},
            {k:'Lack of Insurance', v:'Financial barriers block the long-term therapy and case management that interrupt the cycle of violence.', c:[7]}
        ]}
    ];

    const KPIS = [
        {value:44447, format:'comma', label:'Total Gun Deaths (2024, prov.)', c:2},
        {value:27593, format:'comma', label:'Firearm Suicides — record (2024)', c:2},
        {value:24, suffix:'×', label:'Homicide rate, young Black vs. white males', c:3},
        {value:557, prefix:'$', suffix:'B', label:'Annual Economic Cost', c:12}
    ];

    const NAV = [
        {id:'summary', icon:'fa-clipboard-list', label:'Executive Summary', short:'Executive Summary'},
        {id:'etiology', icon:'fa-magnifying-glass', label:'1. Definition & Root Causes', short:'1. Root Causes'},

    /* ============================================================
       SMALL COMPONENTS
       ============================================================ */
    const Icon = ({name, className='', style}) => <i className={`fa-solid ${name} ${className}`} style={style} aria-hidden="true"></i>;

    function Cite({n}){
        const arr = Array.isArray(n) ? n : [n];
        return <>{arr.map(x => <a key={x} href={'#ref'+x} className="citation">[{x}]</a>)}</>;
    }

    function Photo({src, alt, caption, className='', imgClass='', ratio='56.25%'}){
        const [ok, setOk] = useState(true);
        return (
            <div className={'photo-wrap shadow-md '+className} style={{paddingBottom: caption? undefined : undefined}}>
                <div style={{position:'relative', width:'100%', paddingBottom:ratio}}>
                    {ok
                        ? <img src={src} alt={alt} loading="lazy" onError={()=>setOk(false)}
                               className={'photo '+imgClass} style={{position:'absolute',inset:0}}/>
                        : <div className="photo fallback-grad" style={{position:'absolute',inset:0}} role="img" aria-label={alt}><Icon name="fa-image"/></div>}
                    {caption && <div className="photo-cap">{caption}</div>}
                </div>
            </div>
        );
    }

    function CountUp({target, format, prefix='', suffix=''}){
        const ref = useRef(null);
        useEffect(()=>{
            const el = ref.current; if(!el) return;
            let raf;
            const obs = new IntersectionObserver((ents)=>{
                ents.forEach(en=>{
                    if(en.isIntersecting){
                        const dur=1400, start=performance.now();
                        const step=(now)=>{
                            const p=Math.min((now-start)/dur,1);
                            const eased=1-Math.pow(1-p,3);
                            const val=Math.round(target*eased);
                            const txt = format==='comma' ? val.toLocaleString() : String(val);
                            el.textContent = prefix+txt+suffix;
                            if(p<1) raf=requestAnimationFrame(step);
                        };
                        raf=requestAnimationFrame(step);
                        obs.unobserve(el);
                    }
                });
            },{threshold:0.5});
            obs.observe(el);
            return ()=>{ obs.disconnect(); if(raf) cancelAnimationFrame(raf); };
        },[target]);
        return <span ref={ref}>0</span>;
    }

    function Reveal({children, className='', id}){
        const ref = useRef(null);
        useEffect(()=>{
            const el=ref.current; if(!el) return;
            const obs=new IntersectionObserver((ents)=>{
                ents.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('visible'); obs.unobserve(en.target);} });
            },{threshold:0.08});
            obs.observe(el);
            return ()=>obs.disconnect();
        },[]);
        return <section id={id} ref={ref} className={'reveal '+className}>{children}</section>;
    }

    function Hero(){
        const cv = useRef(null);
        useEffect(()=>{
            const c=cv.current; if(!c) return; const ctx=c.getContext('2d'); let w,h,t=0,raf;
            const pts=[39.7,45.2,48.8,48.2,46.7,44.4];
            const resize=()=>{ w=c.width=c.offsetWidth; h=c.height=c.offsetHeight; };
            resize(); window.addEventListener('resize',resize);
            const draw=()=>{
                ctx.clearRect(0,0,w,h); const max=50,min=35; ctx.beginPath();
                pts.forEach((p,i)=>{ const x=(i/(pts.length-1))*w; const wob=Math.sin(t/30+i)*4; const y=h-((p-min)/(max-min))*h*0.5 - h*0.25 + wob; i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
                ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=2; ctx.stroke();
                ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
                const g=ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,'rgba(229,62,62,0.25)'); g.addColorStop(1,'rgba(229,62,62,0)');
                ctx.fillStyle=g; ctx.fill(); t++; raf=requestAnimationFrame(draw);
            };
            draw();
            return ()=>{ window.removeEventListener('resize',resize); cancelAnimationFrame(raf); };
        },[]);
        return (

                <Hero/>

                {/* Mobile top bar */}
                <div className="md:hidden sticky top-0 z-40 flex items-center justify-between px-4 py-3 bg-white/90 dark:bg-gray-900/90 backdrop-blur border-b border-gray-200 dark:border-gray-700">
                    <span className="font-bold">Dashboard</span>
                    <div className="flex items-center gap-2">
                        <button onClick={()=>setDark(d=>!d)} className="px-3 py-1.5 rounded-lg border border-gray-300 dark:border-gray-600 text-sm">{dark?'☀️':'🌙'}</button>
                        <button onClick={()=>setMobileOpen(true)} className="px-3 py-1.5 rounded-lg border border-gray-300 dark:border-gray-600 text-sm">☰ Menu</button>
                    </div>
                </div>

                <div className="flex">
                    <nav className="hidden md:block sticky top-0 h-screen w-72 shrink-0 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-r border-gray-200 dark:border-gray-700 p-6 shadow-xl overflow-y-auto">
                        <div className="mb-6 flex items-center justify-between">
                            <div><h2 className="text-2xl font-bold mb-1">Navigation</h2><p className="text-sm muted">Epidemiology Objectives</p></div>
                            <button onClick={()=>setDark(d=>!d)} title="Toggle dark mode" className="px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">{dark?'☀️':'🌙'}</button>
                        </div>
                        <NavList useShort={false}/>
                        <div className="mt-8 p-4 rounded-xl bg-gray-50 dark:bg-gray-800 text-xs muted">
                            <p className="font-semibold mb-1">Data currency</p>
                            <p>2023 figures are CDC-finalized; 2024 figures are CDC provisional.</p>
                        </div>
                    </nav>

                    {mobileOpen && (
                        <div className="md:hidden fixed inset-0 z-50">
                            <div className="absolute inset-0 bg-black/50" onClick={()=>setMobileOpen(false)}></div>
                            <nav className="absolute left-0 top-0 h-full w-72 bg-white dark:bg-gray-900 p-6 shadow-2xl overflow-y-auto">
                                <div className="flex items-center justify-between mb-6"><h2 className="text-xl font-bold">Navigation</h2><button onClick={()=>setMobileOpen(false)} className="text-2xl">✕</button></div>
                                <NavList useShort={true}/>
                            </nav>
                        </div>
                    )}

                    <main className="flex-1 p-4 sm:p-8 lg:p-12 min-w-0">
                        <ExecutiveSummary/>
                        <Etiology/>
                        <Burden dark={dark}/>
                        <Cycle/>
                        <Prevention dark={dark}/>
                        <Policy/>
                        <Reflection/>
                        <Methods/>
                        <References/>
                        <footer className="text-center text-xs muted py-8 border-t border-gray-200 dark:border-gray-700">
                            <p>Built as an educational public-health dashboard · Built with React · Charts by Chart.js · Icons by Font Awesome · Photography via Unsplash (royalty-free).</p>
                            <p className="mt-1">Data: CDC (2023 final / 2024 provisional), Johns Hopkins Center for Gun Violence Solutions, Pew Research Center, Everytown Research. Last updated June 2026.</p>
                        </footer>
                    </main>
                </div>

                <button id="backToTop" className={showTop?'show':''} onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} title="Back to top"
                    style={{width:'48px',height:'48px',borderRadius:'9999px',background:'#E53E3E',color:'#fff',fontSize:'1.25rem',boxShadow:'0 4px 14px rgba(0,0,0,.25)',border:'none'}}>↑</button>
            </>
        );
    }

    const boot=document.getElementById('boot'); if(boot) boot.remove();
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
    <script>
      /* Explicitly transpile the JSX with the CLASSIC runtime (React.createElement),
         so the compiled output has no ES-module import statements. */
      (function(){
        try{
          var src = document.getElementById('app-src').textContent;
          var out = Babel.transform(src, {presets:[['react',{runtime:'classic'}]]}).code;
          var s = document.createElement('script');
          s.text = out;
          document.body.appendChild(s);
        }catch(e){
          console.error(e);
          var b = document.getElementById('boot');
          if(b){ b.innerHTML = '<div style="max-width:640px;text-align:center;padding:24px;line-height:1.6">The dashboard failed to build in this browser.<br><small style="opacity:.8">'+(e && e.message ? e.message : e)+'</small></div>'; }
        }
      })();
    </script>
</body>
</html>
